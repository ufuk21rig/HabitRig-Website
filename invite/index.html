<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-itunes-app" content="app-id=6759192273" />
  <title>HabitRig — You're invited!</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(160deg, #FFB347 0%, #FF9F1C 50%, #E88E0F 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1e293b;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(232, 142, 15, 0.35), 0 8px 16px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .gift {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
      animation: bounce 1.6s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 26px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .reward {
      display: inline-block;
      background: #fff7ed;
      border: 1.5px solid #FF9F1C;
      color: #9a3412;
      font-weight: 800;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 999px;
      margin: 12px 0 20px;
    }
    p {
      color: #475569;
      font-size: 15px;
      line-height: 1.55;
      margin-bottom: 28px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 16px;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: transform 0.15s ease;
      margin-bottom: 12px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #FF9F1C 0%, #E88E0F 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(255, 159, 28, 0.35);
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #94a3b8;
    }
    .stores {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }
    .stores a {
      flex: 1;
      max-width: 160px;
    }
    .stores img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="gift">🎁</span>
    <h1>You're invited to HabitRig</h1>
    <span class="reward">+200 gems on signup</span>
    <p>Build habits with friends. Track streaks together. Win rewards for staying consistent.</p>

    <a id="open-app" class="btn btn-primary" href="#">Open in HabitRig</a>

    <div class="stores">
      <a href="https://apps.apple.com/app/id6759192273" target="_blank" rel="noopener">
        <img src="https://habitrig.app/badges/app-store-badge.svg" alt="App Store" onerror="this.outerHTML='<div style=&quot;background:#0f172a;color:white;padding:14px;border-radius:12px;font-weight:700;font-size:13px;&quot;>App Store</div>'" />
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.habitrig.app" target="_blank" rel="noopener">
        <img src="https://habitrig.app/badges/google-play-badge.svg" alt="Google Play" onerror="this.outerHTML='<div style=&quot;background:#0f172a;color:white;padding:14px;border-radius:12px;font-weight:700;font-size:13px;&quot;>Google Play</div>'" />
      </a>
    </div>

    <p class="footer">If the app doesn't open automatically, install HabitRig from your store and tap the link again.</p>
  </div>

  <script>
    (function () {
      var pathParts = window.location.pathname.split('/').filter(Boolean);
      var code = pathParts[pathParts.length - 1] || '';
      var deepLink = 'habitrig://invite/' + code;
      var openBtn = document.getElementById('open-app');
      openBtn.href = deepLink;

      // Auto-attempt deep link on mobile (silent fail if app not installed; user uses store buttons)
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua);
      var isAndroid = /Android/.test(ua);

      if (isIOS || isAndroid) {
        // Slight delay so the page renders first
        setTimeout(function () {
          window.location.href = deepLink;
        }, 600);
      }
    })();
  </script>
</body>
</html>
